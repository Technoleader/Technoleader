<!DOCTYPE html>
<html lang="ru">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">

<title>ООО «Технолидер»</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
-webkit-tap-highlight-color:transparent;
}

html,body{

height:100%;

font-family:-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;

background:#111315;

overflow:hidden;

color:#fff;

}

body{

display:flex;

justify-content:center;

align-items:center;

position:relative;

}

/* фон */

body:before{

content:"";

position:absolute;

inset:-20%;

background:

repeating-radial-gradient(

circle,

rgba(255,255,255,.015) 0,

rgba(255,255,255,.015) 2px,

transparent 2px,

transparent 42px

);

animation:breathe 12s ease-in-out infinite;

opacity:.45;

}

@keyframes breathe{

0%{transform:scale(.98);}
50%{transform:scale(1.02);}
100%{transform:scale(.98);}

}

/* контейнер */

.wrapper{

position:relative;

z-index:2;

width:100%;

padding:20px;

display:flex;

justify-content:center;

}

/* логотип */

.logo{

width:180px;

height:180px;

border-radius:50%;

border:3px solid #1b73ff;

display:flex;

justify-content:center;

align-items:center;

font-size:72px;

font-weight:700;

color:#84bcff;

cursor:pointer;

transition:.45s;

background:#17191b;

box-shadow:

0 0 60px rgba(27,115,255,.15);

user-select:none;

}

.logo:hover{

transform:scale(1.05);

}

.logo.active{

transform:translateY(-70px) scale(.9);

}

/* карточка */

.card{

position:absolute;

left:50%;

top:240px;

transform:translateX(-50%) translateY(30px);

width:min(92vw,420px);

background:#181b1f;

border:1px solid rgba(255,255,255,.08);

border-radius:22px;

padding:28px;

opacity:0;

pointer-events:none;

transition:.45s;

box-shadow:

0 25px 70px rgba(0,0,0,.35);

}

.card.show{

opacity:1;

transform:translateX(-50%) translateY(0);

pointer-events:auto;

}

h2{

font-size:26px;

margin-bottom:22px;

text-align:center;

}

.row{

display:flex;

justify-content:space-between;

padding:10px 0;

border-bottom:1px solid rgba(255,255,255,.06);

font-size:15px;

}

.row:last-child{

border:none;

}

.label{

color:#8f98a5;

}

.value{

text-align:right;

max-width:55%;

}

.note{

margin-top:20px;

text-align:center;

color:#8f98a5;

font-size:13px;

}

/* мобильные */

@media(max-width:480px){

.logo{

width:150px;

height:150px;

font-size:60px;

}

.logo.active{

transform:translateY(-55px) scale(.9);

}

.card{

top:205px;

padding:22px;

}

}

</style>

</head>

<body>

<div class="wrapper">

<div id="logo" class="logo">

ТЛ

</div>

<div id="card" class="card">

<h2>ООО «Технолидер»</h2>

<div class="row">
<div class="label">ИНН</div>
<div class="value">XXXXXXXXXX</div>
</div>

<div class="row">
<div class="label">КПП</div>
<div class="value">XXXXXXXXX</div>
</div>

<div class="row">
<div class="label">ОГРН</div>
<div class="value">XXXXXXXXXXXXX</div>
</div>

<div class="row">
<div class="label">Юридический адрес</div>
<div class="value">г. _________</div>
</div>

<div class="row">
<div class="label">Телефон</div>
<div class="value">+7 (___) ___-__-__</div>
</div>

<div class="row">
<div class="label">E-mail</div>
<div class="value">info@technolider.ru</div>
</div>

<div class="note">

Нажмите на логотип ещё раз, чтобы скрыть информацию

</div>

</div>

</div>

<script>

const logo=document.getElementById("logo");
const card=document.getElementById("card");

logo.onclick=()=>{

logo.classList.toggle("active");
card.classList.toggle("show");

}

</script>

</body>
</html>
